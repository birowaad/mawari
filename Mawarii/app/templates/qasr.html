<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR - قصر أثري | تجربة مباشرة</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Cairo', 'Segoe UI', sans-serif; }
        .info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: #FFD700;
            padding: 12px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(8px);
            font-weight: bold;
        }
        .error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            z-index: 20;
            display: none;
            width: 80%;
        }
    </style>
</head>
<body>

    <div class="info">
        🏛️ **توجيه الكاميرا نحو العلامة "HIRO"** (الصورة المعروضة) لرؤية القصر الأثري
    </div>
    <div id="errorMsg" class="error-msg">
        ⚠️ لم يتم التعرف على العلامة. تأكد من:<br>
        - إضاءة جيدة<br>
        - العلامة واضحة وثابتة<br>
        - منحت المتصفح إذن الوصول للكاميرا
    </div>

    <a-scene 
        embedded
        arjs="sourceType: webcam; debugUIEnabled: true; trackingMethod: best;"
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true">
        
        <!-- علامة HIRO المدمجة -->
        <a-marker preset="hiro" id="hiroMarker">
            
            <!-- نموذج أثري بديل (قلعة/قصر) - رابط مضمون -->
            <a-entity 
                gltf-model="https://threejs.org/examples/models/gltf/FlightHelmet/glTF/FlightHelmet.gltf"
                scale="0.5 0.5 0.5"
                position="0 0 0"
                rotation="0 90 0">
            </a-entity>
            
            <!-- نص يظهر فوق المجسم -->
            <a-text value="🏛️ قصر الفريد - العلا" color="#FFD700" align="center" position="0 1.5 0" scale="0.5 0.5 0.5"></a-text>
            
        </a-marker>

        <!-- كاميرا ثابتة -->
        <a-entity camera></a-entity>
    </a-scene>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
        // التحقق من أخطاء التحميل
        window.addEventListener('load', function() {
            console.log('✅ نظام AR جاهز. وجه الكاميرا نحو علامة Hiro');
            
            // إخفاء رسالة الخطأ بعد 5 ثواني
            setTimeout(() => {
                const errorDiv = document.getElementById('errorMsg');
                if (errorDiv) errorDiv.style.display = 'none';
            }, 5000);
        });
        
        // مراقبة وجود العلامة
        const marker = document.getElementById('hiroMarker');
        if (marker) {
            marker.addEventListener('markerFound', () => {
                console.log('🎯 تم العثور على العلامة!');
            });
            marker.addEventListener('markerLost', () => {
                console.log('👋 فقدت العلامة');
            });
        }
    </script>
</body>
</html>
