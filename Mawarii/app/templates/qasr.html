<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR - معبد الخزنة | البترا</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
        }
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: linear-gradient(90deg, rgba(0,0,0,0.85), rgba(0,0,0,0.7), rgba(0,0,0,0.85));
            color: #FFD700;
            padding: 16px;
            font-size: 14px;
            z-index: 20;
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin: 15px;
            border: 1px solid rgba(218,165,32,0.3);
        }
        .status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #00ff00;
            padding: 8px 18px;
            font-size: 13px;
            border-radius: 30px;
            font-family: monospace;
            z-index: 20;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0,255,0,0.3);
        }
        .ar-btn {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #DAA520, #B8860B);
            border: none;
            border-radius: 60px;
            padding: 14px 32px;
            color: white;
            font-weight: bold;
            z-index: 20;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            animation: pulse 1.8s infinite alternate;
        }
        .ar-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 25px rgba(218,165,32,0.5);
        }
        @keyframes pulse {
            0% { opacity: 0.85; transform: translateX(-50%) scale(1); }
            100% { opacity: 1; transform: translateX(-50%) scale(1.03); }
        }
        model-viewer {
            width: 100%;
            height: 100vh;
            --poster-color: #1a1a1a;
            --progress-bar-color: #DAA520;
            --progress-bar-height: 4px;
        }
        model-viewer::part(default-ar-button) {
            display: none !important;
        }
        @media (max-width: 768px) {
            .ar-btn { padding: 10px 24px; font-size: 16px; bottom: 100px; }
            .info-panel { font-size: 12px; padding: 12px; }
        }
    </style>
</head>
<body>

    <div class="status" id="statusMsg">
        <i class="bi bi-robot"></i> 🔄 جاري تحميل النموذج...
    </div>

    <div class="info-panel">
        🏛️ <strong>معبد الخزنة - البترا</strong> (الحضارة النبطية) 🏛️<br>
        📍 وجه الكاميرا نحو سطح مستوٍ ومسطح (الأرض أو طاولة) لرؤية النموذج الأثري<br>
        ✨ نفس حضارة العلا ومدائن صالح - المملكة العربية السعودية
    </div>

    <button class="ar-btn" id="arButton">
        🕶️ عرض بالواقع المعزز
    </button>

    <!-- نموذج ثلاثي الأبعاد جاهز ويعمل فوراً (من موقع Khronos Group) -->
    <model-viewer 
        id="heritageModel"
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/AncientTomb/glTF/AncientTomb.gltf"
        alt="معبد الخزنة - البترا"
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-scale="auto"
        camera-controls
        auto-rotate
        auto-rotate-delay="1"
        rotation-per-second="15deg"
        exposure="1.0"
        shadow-intensity="0.8"
        environment-image="neutral"
        style="width:100%; height:100vh;">
    </model-viewer>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <script>
        const model = document.getElementById('heritageModel');
        const statusDiv = document.getElementById('statusMsg');
        const arButton = document.getElementById('arButton');
        
        // نموذج تم تحميله بنجاح
        model.addEventListener('load', () => {
            statusDiv.innerHTML = '✅ نموذج معبد الخزنة جاهز | اضغط زر "عرض بالواقع المعزز"';
            statusDiv.style.color = '#00ff00';
            console.log('🎉 نموذج التراث النبطي جاهز للعرض');
        });
        
        // فشل تحميل النموذج
        model.addEventListener('error', (error) => {
            console.error('❌ خطأ في تحميل النموذج:', error);
            statusDiv.innerHTML = '⚠️ خطأ في تحميل النموذج، تأكد من الاتصال بالإنترنت';
            statusDiv.style.color = '#ff6600';
        });
        
        // تشغيل AR عند الضغط على الزر
        arButton.addEventListener('click', async () => {
            statusDiv.innerHTML = '🎯 جاري تشغيل الواقع المعزز...';
            statusDiv.style.color = '#FFD700';
            
            if (model.canActivateAR) {
                try {
                    await model.activateAR();
                    console.log('✅ AR mode activated');
                } catch (err) {
                    console.error('AR activation error:', err);
                    statusDiv.innerHTML = '❌ غير قادر على تشغيل AR، تأكد من منح إذن الكاميرا';
                }
            } else {
                statusDiv.innerHTML = '⚠️ متصفحك لا يدعم AR. جرب Chrome على أندرويد أو Safari على iOS 13+';
                alert('لتجربة الواقع المعزز، استخدم:\n- أندرويد: Chrome مع تثبيت Google Play Services for AR\n- iPhone: Safari (iOS 13 أو أحدث)');
            }
        });
        
        // مراقبة حالة AR
        model.addEventListener('ar-status', (event) => {
            if (event.detail.status === 'session-started') {
                statusDiv.innerHTML = '✨ الواقع المعزز يعمل | يمكنك تحريك الجوال حول النموذج';
                statusDiv.style.color = '#FFD700';
            } else if (event.detail.status === 'session-ended') {
                statusDiv.innerHTML = '✅ تم الخروج من وضع AR | يمكنك إعادة المحاولة';
                statusDiv.style.color = '#00ff00';
            }
        });
        
        console.log('💡 نصيحة: وجه الكاميرا نحو أرضية الغرفة أو طاولة مسطحة لظهور النموذج');
    </script>
</body>
</html>
