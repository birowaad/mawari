<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تجربة AR - قصر أثرى</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Cairo', sans-serif; }
        .info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    
    <!-- معلومات للمستخدم -->
    <div class="info">
        🏛️ قم بتوجيه الكاميرا نحو علامة "Hiro" (الصورة بالأعلى) لرؤية القصر الأثري
    </div>

    <!-- مشهد A-Frame الذي سيحتوي على AR -->
    <a-scene 
        embedded
        arjs='sourceType: webcam; debugUIEnabled: false; trackingMethod: best;'
        vr-mode-ui="enabled: false">
        
        <!-- هذه هي العلامة التي سيتم التعرف عليها -->
        <a-marker preset="hiro">
            
            <!-- هنا نضيف النموذج ثلاثي الأبعاد للموقع الأثري (من نموذج مجاني لقلعة قديمة) -->
            <!-- الرابط الاتي لنموذج `ancient_place.glb` هو مثال من مصدر مجاني على الإنترنت[citation:1] -->
            <a-entity 
                gltf-model="https://raw.githubusercontent.com/AR-js-org/AR.js/master/aframe/examples/assets/colosseum/colosseum.gltf"
                scale="0.5 0.5 0.5"
                position="0 0 0"
                rotation="0 0 0">
            </a-entity>

        </a-marker>

        <!-- كاميرا ثابتة للمشهد -->
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // هذا السكريبت لطباعة رسالة في وحدة التحكم للتأكد من تحميل المكتبات
        window.addEventListener('load', function() {
            console.log('🎉 AR system ready. Point your camera at the Hiro marker!');
        });
    </script>
    
    <!-- استيراد مكتبات AR.js و A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

</body>
</html>
