<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR تجربة - معبد البترا الأثري</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Cairo', sans-serif; }
        .info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.8);
            color: #FFD700;
            padding: 15px;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(8px);
            border-radius: 12px;
            margin: 10px;
        }
        .status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #00ff00;
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 8px;
            font-family: monospace;
            z-index: 10;
        }
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.02); }
        }
        .btn-ar-custom {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #DAA520, #B8860B);
            border: none;
            border-radius: 50px;
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            z-index: 20;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: pulse 1.5s infinite alternate;
        }
    </style>
</head>
<body>

    <div class="status" id="statusMsg">🔄 جاري تحميل النظام...</div>
    <div class="info">
        🏛️ **معبد الخزنة - البترا** (الحضارة النبطية)<br>
        📍 وجه الكاميرا نحو العلامة أو سطح مستوٍ لرؤية النموذج الأثري<br>
        ✨ نفس حضارة العلا ومدائن صالح
    </div>
    <button class="btn-ar-custom" id="arBtn">🕶️ عرض بالواقع المعزز</button>

    <model-viewer 
        id="heritage-viewer"
        src="رابط_النموذج_الخاص_بك.glb"
        alt="معبد البترا - الحضارة النبطية"
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-scale="auto"
        camera-controls
        auto-rotate
        auto-rotate-delay="1"
        rotation-per-second="15deg"
        environment-image="neutral"
        style="width:100%; height:100vh; --poster-color: #1a1a1a; --progress-bar-color: #DAA520;">
        
        <button slot="ar-button" class="ar-button-default" style="display:none;"></button>
    </model-viewer>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <script>
        const viewer = document.getElementById('heritage-viewer');
        const statusDiv = document.getElementById('statusMsg');
        const arBtn = document.getElementById('arBtn');
        
        // إخفاء الزر الافتراضي لـ model-viewer
        viewer.addEventListener('load', () => {
            statusDiv.innerHTML = '✅ النموذج جاهز | اضغط زر "عرض بالواقع المعزز"';
            statusDiv.style.color = '#00ff00';
            console.log('🎉 نموذج البترا جاهز للعرض');
        });
        
        // تفعيل AR عند الضغط على الزر المخصص
        arBtn.addEventListener('click', () => {
            if (viewer.canActivateAR) {
                viewer.activateAR();
                statusDiv.innerHTML = '🎯 جاري تشغيل الواقع المعزز...';
            } else {
                statusDiv.innerHTML = '⚠️ متصفحك لا يدعم AR. جرب Chrome أو Safari على جوال حديث';
                statusDiv.style.color = '#ffaa00';
            }
        });
        
        viewer.addEventListener('ar-status', (event) => {
            if (event.detail.status === 'session-started') {
                statusDiv.innerHTML = '✨ وضع AR نشط | يمكنك تحريك الجوال حول النموذج';
                statusDiv.style.color = '#FFD700';
            }
        });
        
        viewer.addEventListener('error', (error) => {
            console.error('❌ خطأ:', error);
            statusDiv.innerHTML = '❌ حدث خطأ في تحميل النموذج';
        });
    </script>
</body>
</html>
