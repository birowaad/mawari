<!DOCTYPE html your-server="needed">
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR - تجربة قصر أثري | نظام عملي</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.8);
            color: #FFD700;
            padding: 12px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            font-weight: bold;
            border-radius: 10px;
            margin: 10px;
        }
        .status {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 5px;
            font-family: monospace;
            z-index: 10;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="status" id="statusMsg">🔄 جاري تحميل النظام...</div>
    <div class="info">
        🏛️ **وجه الكاميرا نحو علامة "HIRO"** (الصورة المعروضة) لرؤية النموذج الأثري<br>
        📍 تأكد من إضاءة جيدة وثبات اليد
    </div>

    <!-- مشهد AR الرئيسي -->
    <a-scene 
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true">
        
        <!-- علامة HIRO المدمجة -->
        <a-marker preset="hiro" id="arMarker">
            
            <!-- نموذج أثري (قصر/معبد) - رابط مضمون من نموذج افتراضي -->
            <a-entity 
                gltf-model="https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/FlightHelmet/glTF/FlightHelmet.gltf"
                scale="0.3 0.3 0.3"
                position="0 0 0"
                rotation="0 90 0">
            </a-entity>
            
            <!-- نص توضيحي فوق النموذج -->
            <a-text value="🏛️ قصر أثري - العلا" color="#FFD700" align="center" position="0 1.2 0" scale="0.8 0.8 0.8"></a-text>
            
        </a-marker>

        <!-- كاميرا المشهد -->
        <a-entity camera></a-entity>
    </a-scene>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        // مراقبة حالة النظام
        const statusDiv = document.getElementById('statusMsg');
        
        // رسالة عند تحميل الصفحة
        window.addEventListener('load', function() {
            statusDiv.innerHTML = '✅ النظام جاهز | وجه الكاميرا نحو العلامة "Hiro"';
            statusDiv.style.color = '#0f0';
            console.log('✅ AR system loaded successfully!');
        });
        
        // مراقبة العثور على العلامة
        const marker = document.getElementById('arMarker');
        if (marker) {
            marker.addEventListener('markerFound', () => {
                statusDiv.innerHTML = '🎯 تم العثور على العلامة! النموذج معروض';
                statusDiv.style.color = '#FFD700';
                console.log('🎯 HIRO marker found!');
            });
            
            marker.addEventListener('markerLost', () => {
                statusDiv.innerHTML = '🔍 تم فقد العلامة. وجه الكاميرا نحو العلامة مرة أخرى';
                statusDiv.style.color = '#ffaa00';
                console.log('👋 HIRO marker lost');
            });
        }
        
        // في حالة حدوث خطأ في تحميل النموذج
        window.addEventListener('error', (e) => {
            if (e.message && e.message.includes('gltf')) {
                statusDiv.innerHTML = '⚠️ خطأ في تحميل النموذج. تأكد من الاتصال بالإنترنت';
                statusDiv.style.color = '#ff0000';
            }
        });
    </script>
</body>
</html>
